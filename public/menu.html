<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Menu - Calaman's Kitchen</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        padding-top: 2rem;
      }

      .menu-only-header {
        margin-bottom: 2.5rem;
      }

      .menu-only-cta {
        position: sticky;
        bottom: 1rem;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <main class="section-space pt-0">
      <div class="container">
        <div class="menu-only-header text-center">
          <h1 class="display-5 mb-2">Food Menu</h1>
          <p class="text-muted mb-0">Select dishes only. Add to cart, then click Place Order to continue to checkout details.</p>
        </div>

        <section class="mb-5">
          <h2 class="menu-section-title mb-3">Rice varieties and spaghetti</h2>
          <div id="rice-grid" class="row g-4"></div>
        </section>

        <section class="mb-5">
          <h2 class="menu-section-title mb-3">Proteins</h2>
          <div id="protein-grid" class="row g-4"></div>
        </section>

        <section class="mb-5">
          <h2 class="menu-section-title mb-3">Soups</h2>
          <div id="soup-grid" class="row g-4"></div>
        </section>

        <section class="mb-4">
          <h2 class="menu-section-title mb-3">Swallow</h2>
          <div id="swallow-grid" class="row g-4"></div>
        </section>

        <div class="menu-only-cta text-center">
          <a href="checkout.html" class="btn btn-accent btn-lg rounded-pill px-5">Place Order</a>
        </div>
      </div>
    </main>

    <script src="menu.js"></script>
  </body>
</html>
