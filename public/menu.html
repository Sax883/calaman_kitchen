      body {
        padding-top: 2rem;
      }

      .menu-only-header {
        margin-bottom: 2.5rem;
      }

      .menu-only-cta {
        position: sticky;
        bottom: 1rem;
        z-index: 20;
      }

  <body>
    <main class="section-space pt-0">
      <div class="container">
        <div class="menu-only-header text-center">
          <h1 class="display-5 mb-2">Food Menu</h1>
          <p class="text-muted mb-0">Explore our updated soups, rice options, proteins, and special orders. Add your picks to cart, then continue to checkout.</p>
        </div>

        <section class="mb-5">
          <h2 class="menu-section-title mb-3">Rice and Pasta</h2>
          <div id="rice-grid" class="row g-4"></div>
        </section>

        <section class="mb-5">
          <h2 class="menu-section-title mb-3">Proteins</h2>
          <div id="protein-grid" class="row g-4"></div>
        </section>

        <section class="mb-5">
          <h2 class="menu-section-title mb-3">Special Orders</h2>
          <div id="special-grid" class="row g-4"></div>
        </section>

        <section class="mb-5">
          <h2 class="menu-section-title mb-3">Soups</h2>
          <div id="soup-grid" class="row g-4"></div>
        </section>

        <section class="mb-4">
          <h2 class="menu-section-title mb-3">Swallow</h2>
          <div id="swallow-grid" class="row g-4"></div>
        </section>

        <div class="menu-only-cta text-center">
          <a href="checkout.html" class="btn btn-accent btn-lg rounded-pill px-5">Place Order</a>
        </div>
      </div>
    </main>
